<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖱️ LTM Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            width: 100%;
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #8b0000;
            margin-bottom: 30px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            flex: 1;
        }
        
        .balance-container {
            background: #1a1a1a;
            border: 2px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .balance-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .balance-value {
            color: #d4af37;
            font-size: 48px;
            font-weight: bold;
        }
        
        .coin-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
        }
        
        .coin {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #fff;
            border: 4px solid #8b0000;
            transition: transform 0.1s;
        }
        
        .coin:active {
            transform: scale(0.95);
        }
        
        .stats-container {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #d4af37;
            font-weight: bold;
        }
        
        .floating-text {
            position: fixed;
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">🖱️ Кликер</span>
    </div>

    <div class="balance-container">
        <div class="balance-label">Твой баланс</div>
        <div class="balance-value" id="balance">0</div>
    </div>

    <div class="coin-container" onclick="handleClick(event)">
        <div class="coin">💰</div>
    </div>

    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-label">Кликов</span>
            <span class="stat-value" id="clicks">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">За клик</span>
            <span class="stat-value" id="perClick">0.01 LTM</span>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://85.239.60.142:3000';

        let tg = window.Telegram.WebApp;
        tg.ready();

        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? user.id.toString() : 'guest_' + Date.now();

        let balance = 0;
        let clicks = 0;

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/balance/${currentUserId}`);
                const data = await response.json();
                balance = data.balance || 0;
                clicks = data.clicks || 0;
                updateUI();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('clicks').innerText = clicks;
        }

        async function handleClick(event) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    balance = data.balance;
                    clicks = data.clicks;
                    updateUI();
                    
                    // Флоатер
                    let floating = document.createElement('div');
                    floating.className = 'floating-text';
                    floating.innerText = `+${data.earned.toFixed(2)} LTM`;
                    floating.style.left = (event.clientX - 20) + 'px';
                    floating.style.top = (event.clientY - 30) + 'px';
                    document.body.appendChild(floating);
                    setTimeout(() => floating.remove(), 1000);
                }
            } catch (error) {
                console.error('Ошибка клика:', error);
            }
        }

        loadStats();
    </script>
</body>
</html>
