<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖱️ LTM Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        .gothic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #0a0a0a 80%);
            z-index: -1;
        }
        
        .header {
            width: 100%;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #8b0000;
            border-radius: 15px 15px 0 0;
            margin-bottom: 25px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            flex: 1;
        }
        
        .balance-container {
            background: #1a1a1a;
            border: 2px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .balance-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .balance-value {
            color: #d4af37;
            font-size: 36px;
            font-weight: bold;
        }
        
        .balance-currency {
            color: #8b0000;
            font-size: 18px;
        }
        
        .coin-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .coin-container:active {
            transform: scale(0.95);
        }
        
        .coin {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #fff;
            text-shadow: 0 0 20px #8b0000;
            box-shadow: 0 10px 20px rgba(139,0,0,0.5);
            border: 4px solid #8b0000;
            transition: all 0.2s;
        }
        
        .coin:hover {
            transform: rotate(5deg);
            box-shadow: 0 15px 30px rgba(139,0,0,0.8);
        }
        
        .stats-container {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #d4af37;
            font-weight: bold;
        }
        
        .energy-bar {
            width: 100%;
            height: 20px;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #d4af37);
            width: 100%;
            transition: width 0.3s;
        }
        
        .boosts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        
        .boost-btn {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .boost-btn:hover {
            background: #8b0000;
            transform: translateY(-2px);
        }
        
        .boost-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .boost-btn .boost-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .boost-btn .boost-price {
            color: #d4af37;
            font-size: 14px;
        }
        
        .shop-link {
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        
        .shop-link:hover {
            background: #a00;
            transform: scale(1.02);
        }
        
        .leaderboard {
            width: 100%;
            max-width: 400px;
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
        }
        
        .leaderboard h3 {
            color: #d4af37;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .leaderboard-rank {
            color: #8b0000;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .leaderboard-name {
            flex: 1;
            color: #fff;
        }
        
        .leaderboard-score {
            color: #d4af37;
        }
        
        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }
        
        /* Анимация для флоатеров */
        .floating-text {
            position: fixed;
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px #8b0000;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>
<body>
    <div class="gothic-bg"></div>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">🖱️ LTM Clicker</span>
    </div>

    <div class="balance-container">
        <div class="balance-label">Твой баланс</div>
        <div class="balance-value" id="balance">0</div>
        <div class="balance-currency">LTM</div>
    </div>

    <div class="coin-container" id="coin" onclick="handleClick(event)">
        <div class="coin">💰</div>
    </div>

    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-label">Кликов</span>
            <span class="stat-value" id="clicks">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">За клик</span>
            <span class="stat-value" id="perClick">0.01 LTM</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Множитель</span>
            <span class="stat-value" id="multiplier">x1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Автокликер</span>
            <span class="stat-value" id="autoClicker">0/мин</span>
        </div>
        <div class="energy-bar">
            <div class="energy-fill" id="energyBar" style="width: 100%"></div>
        </div>
        <div class="stat-item">
            <span class="stat-label">Энергия</span>
            <span class="stat-value" id="energy">1000/1000</span>
        </div>
    </div>

    <a href="shop.html" class="shop-link">
        <span>🏪</span> Купить бусты в магазине
    </a>

    <div class="boosts-container">
        <div class="boost-btn" onclick="buyBoost('energy')" id="boostEnergy">
            <div class="boost-name">⚡ Энергия</div>
            <div class="boost-price" id="boostEnergyPrice">100 LTM</div>
        </div>
        <div class="boost-btn" onclick="buyBoost('multiplier')" id="boostMultiplier">
            <div class="boost-name">💪 Множитель</div>
            <div class="boost-price" id="boostMultiplierPrice">200 LTM</div>
        </div>
    </div>

    <div class="leaderboard">
        <h3>🏆 Топ кликеров</h3>
        <div id="leaderboard"></div>
    </div>

    <div class="status" id="status"></div>

    <script src="wallet.js"></script>
    <script src="shop.js"></script>
    <script>
        // Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Данные пользователя
        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? 'tg_' + user.id : 'guest_' + Date.now();
        let userName = user ? user.first_name : 'Гость';
        
        // Проверяем, что классы загружены
        if (typeof LTMFinance === 'undefined') {
            console.error('❌ LTMFinance не загружен!');
            alert('Ошибка загрузки финансовой системы. Обновите страницу.');
        } else {
            console.log('✅ LTMFinance загружен');
        }
        
        // Инициализация финансов
        let finance;
        try {
            finance = new LTMFinance(currentUserId);
            console.log('💰 Финансы инициализированы. Баланс:', finance.getBalance());
        } catch (e) {
            console.error('❌ Ошибка создания finance:', e);
            finance = { 
                getBalance: () => 0, 
                add: (amount, reason) => { console.log('Добавлено:', amount, reason); return true; },
                spend: () => false,
                subscribe: () => {}
            };
        }
        
        // Инициализация магазина
        let shop;
        try {
            shop = new LTMShop(finance);
            console.log('🛒 Магазин инициализирован');
        } catch (e) {
            console.error('❌ Ошибка создания shop:', e);
            shop = { 
                getItems: () => [], 
                getInventory: () => [], 
                applyEffects: (s) => s 
            };
        }
        
        // Состояние кликера
        let gameState = {
            clicks: parseInt(localStorage.getItem('ltm_clicks_' + currentUserId)) || 0,
            energy: parseInt(localStorage.getItem('ltm_energy_' + currentUserId)) || 1000,
            maxEnergy: parseInt(localStorage.getItem('ltm_maxEnergy_' + currentUserId)) || 1000,
            multiplier: 1,
            autoClicker: 0,
            perClick: 0.01
        };
        
        console.log('🎮 gameState создан:', gameState);
        
        // Применяем эффекты из магазина
        function applyBoosts() {
            try {
                let stats = shop.applyEffects({ clickMultiplier: 1, autoClicks: 0 });
                gameState.multiplier = stats.clickMultiplier || 1;
                gameState.autoClicker = stats.autoClicks || 0;
                gameState.perClick = 0.01 * gameState.multiplier;
                
                updateUI();
            } catch (e) {
                console.error('Ошибка применения бустов:', e);
            }
        }
        
        // Обновление интерфейса
        function updateUI() {
            document.getElementById('balance').innerText = finance.getBalance().toFixed(2);
            document.getElementById('clicks').innerText = gameState.clicks;
            document.getElementById('perClick').innerText = gameState.perClick.toFixed(2) + ' LTM';
            document.getElementById('multiplier').innerText = 'x' + gameState.multiplier;
            document.getElementById('autoClicker').innerText = gameState.autoClicker + '/мин';
            document.getElementById('energy').innerText = gameState.energy + '/' + gameState.maxEnergy;
            
            let energyPercent = (gameState.energy / gameState.maxEnergy) * 100;
            document.getElementById('energyBar').style.width = energyPercent + '%';
            
            // Сохраняем
            localStorage.setItem('ltm_clicks_' + currentUserId, gameState.clicks);
            localStorage.setItem('ltm_energy_' + currentUserId, gameState.energy);
            localStorage.setItem('ltm_maxEnergy_' + currentUserId, gameState.maxEnergy);
        }
        
        // Обработка клика
        function handleClick(event) {
            console.log('🖱️ Клик! Энергия:', gameState.energy);
            
            if (!gameState) {
                console.error('gameState не определен');
                return;
            }
            
            if (gameState.energy <= 0) {
                setStatus('⚡ Нет энергии! Купи энергию в магазине');
                return;
            }
            
            // Рассчитываем заработок
            let earned = gameState.perClick;
            
            // Добавляем в кошелёк
            try {
                finance.add(earned, 'Клик в кликере');
                console.log('💰 Добавлено', earned, 'LTM');
            } catch (e) {
                console.error('Ошибка добавления LTM:', e);
            }
            
            // Обновляем статистику
            gameState.clicks++;
            gameState.energy--;
            
            // Сохраняем клики пользователя
            let userClicks = parseInt(localStorage.getItem('ltm_user_clicks_' + currentUserId)) || 0;
            userClicks++;
            localStorage.setItem('ltm_user_clicks_' + currentUserId, userClicks);
            
            // Создаём флоатер
            if (event) {
                let floating = document.createElement('div');
                floating.className = 'floating-text';
                floating.innerText = '+' + earned.toFixed(2) + ' LTM';
                floating.style.left = (event.clientX - 30) + 'px';
                floating.style.top = (event.clientY - 40) + 'px';
                document.body.appendChild(floating);
                
                setTimeout(() => floating.remove(), 1000);
            }
            
            // Вибрация
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            updateUI();
        }
        
        // Покупка бустов (локальные, для быстрого доступа)
        function buyBoost(type) {
            let price = type === 'energy' ? 100 : 200;
            
            if (finance.getBalance() < price) {
                setStatus('❌ Недостаточно LTM');
                return;
            }
            
            if (type === 'energy') {
                finance.spend(price, 'Покупка энергии');
                gameState.maxEnergy += 100;
                gameState.energy += 100;
                setStatus('✅ Энергия увеличена!');
            } else {
                finance.spend(price, 'Покупка множителя');
                gameState.multiplier++;
                gameState.perClick = 0.01 * gameState.multiplier;
                setStatus('✅ Множитель увеличен!');
            }
            
            updateUI();
        }
        
        // Автокликер
        function startAutoClicker() {
            if (gameState.autoClicker > 0) {
                setInterval(() => {
                    if (gameState.energy > 0) {
                        let earned = gameState.perClick;
                        finance.add(earned, 'Автоклик');
                        gameState.clicks++;
                        gameState.energy--;
                        updateUI();
                    }
                }, 60000 / gameState.autoClicker);
            }
        }
        
        // Обновление таблицы лидеров
        function updateLeaderboard() {
            // Собираем данные из localStorage
            let leaderboard = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key && key.startsWith('ltm_user_clicks_')) {
                    let userId = key.replace('ltm_user_clicks_', '');
                    let clicks = parseInt(localStorage.getItem(key)) || 0;
                    let name = userId === currentUserId ? userName + ' (Вы)' : userId.substring(0, 8) + '...';
                    
                    leaderboard.push({ name: name, clicks: clicks });
                }
            }
            
            // Сортируем
            leaderboard.sort((a, b) => b.clicks - a.clicks);
            leaderboard = leaderboard.slice(0, 10);
            
            // Отрисовываем
            let html = '';
            leaderboard.forEach((entry, index) => {
                html += `
                    <div class="leaderboard-item">
                        <span class="leaderboard-rank">${index + 1}</span>
                        <span class="leaderboard-name">${entry.name}</span>
                        <span class="leaderboard-score">${entry.clicks.toLocaleString()}</span>
                    </div>
                `;
            });
            
            if (leaderboard.length === 0) {
                html = '<div style="text-align: center; color: #888; padding: 20px;">Пока нет данных</div>';
            }
            
            document.getElementById('leaderboard').innerHTML = html;
        }
        
        function setStatus(text) {
            document.getElementById('status').innerText = text;
            setTimeout(() => document.getElementById('status').innerText = '', 2000);
        }
        
        // Инициализация
        try {
            applyBoosts();
            updateUI();
            updateLeaderboard();
            startAutoClicker();
            console.log('✅ Кликер инициализирован');
        } catch (e) {
            console.error('Ошибка инициализации:', e);
        }
        
        // Подписка на изменения баланса
        if (finance.subscribe) {
            finance.subscribe(() => {
                updateUI();
            });
        }
        
        // Главная кнопка Telegram
        tg.MainButton.setText('⚔️ LTM Empire').show();
        tg.MainButton.onClick(() => {
            window.location.href = 'index.html';
        });
        
        // Для отладки - делаем функции глобальными
        window.debug = {
            finance,
            shop,
            gameState,
            handleClick,
            buyBoost
        };
    </script>
</body>
</html>
