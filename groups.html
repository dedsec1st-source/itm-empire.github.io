<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 LTM Группы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .gothic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #0a0a0a 80%);
            z-index: -1;
        }
        
        .header {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #8b0000;
            border-radius: 15px 15px 0 0;
            margin-bottom: 25px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            flex: 1;
        }
        
        .create-btn {
            background: #8b0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .group-card {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .group-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 10px 30px rgba(139,0,0,0.3);
        }
        
        .group-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .group-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #d4af37;
        }
        
        .group-info {
            flex: 1;
        }
        
        .group-name {
            font-size: 18px;
            font-weight: bold;
            color: #d4af37;
        }
        
        .group-meta {
            color: #888;
            font-size: 12px;
            margin-top: 3px;
        }
        
        .group-description {
            color: #fff;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        
        .group-stats {
            display: flex;
            gap: 15px;
            color: #888;
            font-size: 12px;
        }
        
        .group-stats span {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .admin-badge {
            background: #8b0000;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 8px;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            border: 2px solid #8b0000;
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            color: #fff;
        }
        
        .modal h3 {
            color: #d4af37;
            margin-bottom: 20px;
        }
        
        .modal input, .modal textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #3a3a3a;
            border: 1px solid #8b0000;
            border-radius: 8px;
            color: #fff;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .modal-btn.primary {
            background: #8b0000;
            color: #fff;
        }
        
        .modal-btn.secondary {
            background: #3a3a3a;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="gothic-bg"></div>
    
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    
    <div class="modal" id="createGroupModal">
        <h3>👥 Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название группы">
        <textarea id="groupDescription" placeholder="Описание группы" rows="3"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn primary" onclick="createGroup()">Создать</button>
            <button class="modal-btn secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">👥 Группы</span>
        <button class="create-btn" onclick="showCreateModal()">
            <span>➕</span> Создать группу
        </button>
    </div>

    <div class="groups-grid" id="groupsGrid">
        <!-- Группы будут загружаться сюда -->
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? 'tg_' + user.id : 'guest_' + Date.now();
        
        // Загрузка групп
        let groups = JSON.parse(localStorage.getItem('ltm_groups')) || [
            {
                id: 'group_1',
                name: 'LTM Империя',
                description: 'Главная группа империи. Обсуждаем всё!',
                avatar: '👑',
                members: 42,
                online: 12,
                admins: [currentUserId],
                createdBy: currentUserId
            },
            {
                id: 'group_2',
                name: 'Кликеры',
                description: 'Зарабатываем LTM вместе',
                avatar: '🖱️',
                members: 28,
                online: 5,
                admins: [],
                createdBy: 'user2'
            }
        ];
        
        function loadGroups() {
            let grid = document.getElementById('groupsGrid');
            grid.innerHTML = '';
            
            groups.forEach(group => {
                let isAdmin = group.admins.includes(currentUserId) || group.createdBy === currentUserId;
                let card = document.createElement('div');
                card.className = 'group-card';
                card.onclick = () => openGroup(group.id);
                
                card.innerHTML = `
                    <div class="group-header">
                        <div class="group-avatar">${group.avatar || '👥'}</div>
                        <div class="group-info">
                            <div class="group-name">
                                ${group.name}
                                ${isAdmin ? '<span class="admin-badge">АДМИН</span>' : ''}
                            </div>
                            <div class="group-meta">${group.members} участников · ${group.online} онлайн</div>
                        </div>
                    </div>
                    <div class="group-description">${group.description}</div>
                    <div class="group-stats">
                        <span>👥 ${group.members}</span>
                        <span>💬 ${group.messages || 0}</span>
                        <span>📅 ${new Date().toLocaleDateString()}</span>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function showCreateModal() {
            document.getElementById('createGroupModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('createGroupModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        function createGroup() {
            let name = document.getElementById('groupName').value.trim();
            let description = document.getElementById('groupDescription').value.trim();
            
            if (!name) {
                tg.showAlert('Введите название группы');
                return;
            }
            
            let newGroup = {
                id: 'group_' + Date.now(),
                name: name,
                description: description || 'Новая группа',
                avatar: '👥',
                members: 1,
                online: 1,
                admins: [currentUserId],
                createdBy: currentUserId,
                messages: 0
            };
            
            groups.push(newGroup);
            localStorage.setItem('ltm_groups', JSON.stringify(groups));
            
            closeModal();
            document.getElementById('groupName').value = '';
            document.getElementById('groupDescription').value = '';
            loadGroups();
            
            tg.HapticFeedback?.notificationOccurred('success');
        }
        
        function openGroup(groupId) {
            // Переход в группу (можно создать отдельную страницу)
            tg.showAlert('Чат группы откроется в следующем обновлении');
        }
        
        loadGroups();
        
        tg.MainButton.setText('⚔️ LTM Empire').show();
        tg.MainButton.onClick(() => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
