<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏴 LTM Empire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .title {
            font-size: 48px;
            color: #d4af37;
            text-shadow: 0 0 20px #8b0000;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8b0000;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .user-info {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #d4af37;
            border: 2px solid #d4af37;
        }
        
        .user-name {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
        }
        
        .user-id {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .menu-item {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #fff;
        }
        
        .menu-item:hover {
            background: #8b0000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(139,0,0,0.3);
        }
        
        .menu-item .emoji {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .menu-item .label {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .menu-item .desc {
            color: #888;
            font-size: 14px;
        }
        
        .menu-item:hover .desc {
            color: #fff;
        }
        
        .status {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
        }
        
        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🏴 LTM EMPIRE</div>
            <div class="subtitle">ANARCHY • MUSIC • FREEDOM</div>
        </div>
        
        <div class="user-info" id="userInfo">
            <div class="avatar" id="userAvatar">💀</div>
            <div>
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-id" id="userId"></div>
            </div>
        </div>
        
        <div class="menu">
            <a href="messenger.html" class="menu-item">
                <span class="emoji">💬</span>
                <span class="label">Мессенджер</span>
                <span class="desc">Свободное общение</span>
            </a>
            
            <a href="clicker.html" class="menu-item">
                <span class="emoji">🖱️</span>
                <span class="label">Кликер</span>
                <span class="desc">Зарабатывай LTM</span>
            </a>
            
            <a href="music.html" class="menu-item">
                <span class="emoji">🎵</span>
                <span class="label">Музыка</span>
                <span class="desc">Свой плеер</span>
            </a>
            
            <a href="feed.html" class="menu-item">
                <span class="emoji">📰</span>
                <span class="label">Лента</span>
                <span class="desc">Посты и свобода</span>
            </a>
        </div>
        
        <div class="status">
            <span class="online-dot"></span> 
            <span id="onlineStatus">Империя ждет тебя</span>
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Получаем данные пользователя из Telegram
        let user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userId').textContent = 'TG ID: ' + user.id;
            
            // Сохраняем в localStorage для других страниц
            localStorage.setItem('tg_id', user.id);
            localStorage.setItem('tg_username', user.username || user.first_name);
            localStorage.setItem('tg_first_name', user.first_name);
            
            // Пробуем загрузить аватар
            if (user.photo_url) {
                document.getElementById('userAvatar').innerHTML = `<img src="${user.photo_url}" style="width:100%; height:100%; border-radius:50%;">`;
            } else {
                document.getElementById('userAvatar').textContent = user.first_name.charAt(0).toUpperCase();
            }
        }
        
        // Показываем статус онлайн
        setInterval(() => {
            fetch('https://itm-empire.github.io/api/heartbeat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: user?.id || 'guest'})
            }).catch(() => {});
        }, 30000);
        
        // Главная кнопка Telegram
        tg.MainButton.setText('⚔️ Войти в империю').show();
        tg.MainButton.onClick(() => {
            tg.showAlert('Добро пожаловать, воин!');
        });
    </script>
</body>
</html>
