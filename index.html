<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏴 LTM Empire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .gothic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #0a0a0a 80%);
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        .header {
            margin-bottom: 40px;
            text-align: center;
        }
        
        .title {
            font-size: 64px;
            color: #d4af37;
            text-shadow: 0 0 30px #8b0000;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8b0000;
            font-size: 20px;
            letter-spacing: 3px;
        }
        
        .user-info {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #8b0000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 25px;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #d4af37;
            border: 3px solid #d4af37;
            overflow: hidden;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-size: 28px;
            color: #d4af37;
            margin-bottom: 5px;
        }
        
        .user-stats {
            display: flex;
            gap: 30px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            color: #d4af37;
            font-size: 20px;
            font-weight: bold;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
        }
        
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .menu-item {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #8b0000;
            border-radius: 20px;
            padding: 35px 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #fff;
            text-align: center;
        }
        
        .menu-item:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 20px 40px rgba(139,0,0,0.4);
        }
        
        .menu-item .emoji {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        
        .menu-item .label {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .menu-item .desc {
            color: #888;
            font-size: 14px;
        }
        
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #8b0000;
            color: #fff;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
        }
        
        .status {
            margin-top: 40px;
            color: #888;
            text-align: center;
        }
        
        .online-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 5px;
        }
        
        .wallet-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 2px solid #8b0000;
            border-radius: 15px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }
        
        .wallet-icon {
            font-size: 24px;
            color: #d4af37;
        }
        
        .wallet-balance {
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="gothic-bg"></div>

    <div class="container">
        <div class="header">
            <div class="title">LTM EMPIRE</div>
            <div class="subtitle">ANARCHY • MUSIC • FREEDOM</div>
        </div>
        
        <div class="user-info" id="userInfo">
            <div class="avatar" id="userAvatar">💀</div>
            <div class="user-details">
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-stats">
                    <div class="stat">
                        <div class="stat-value" id="statBalance">0</div>
                        <div class="stat-label">LTM</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="statClicks">0</div>
                        <div class="stat-label">кликов</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="menu">
            <a href="clicker.html" class="menu-item">
                <span class="emoji">🖱️</span>
                <span class="label">Кликер</span>
                <span class="desc">Зарабатывай LTM</span>
            </a>
            
            <a href="feed.html" class="menu-item">
                <span class="emoji">📰</span>
                <span class="label">Лента</span>
                <span class="desc">Посты и свобода</span>
            </a>
            
            <a href="profile.html" class="menu-item">
                <span class="emoji">👤</span>
                <span class="label">Профиль</span>
                <span class="desc">Твоя статистика</span>
            </a>
        </div>
        
        <div class="status">
            <span class="online-dot"></span> 
            <span>Империя ждет тебя</span>
        </div>
    </div>

    <script>
        // Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? user.id.toString() : 'guest_' + Date.now();

        // Авторизация на сервере
        async function authUser() {
            if (!user) {
                document.getElementById('userName').innerText = 'Гость';
                return;
            }
            
            try {
                const url = API_BASE_URL ? `${API_BASE_URL}/api/auth/telegram` : '/api/auth/telegram';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: user.id,
                        first_name: user.first_name,
                        last_name: user.last_name,
                        username: user.username,
                        photo_url: user.photo_url
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    console.log('✅ Авторизация:', data.user);
                    document.getElementById('userName').innerText = user.first_name;
                    if (user.photo_url) {
                        document.getElementById('userAvatar').innerHTML = `<img src="${user.photo_url}">`;
                    }
                    loadBalance();
                }
            } catch (error) {
                console.error('❌ Ошибка авторизации:', error);
            }
        }

        // Загрузка баланса
        async function loadBalance() {
            try {
                const url = API_BASE_URL ? `${API_BASE_URL}/api/balance/${currentUserId}` : `/api/balance/${currentUserId}`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('statBalance').innerText = data.balance.toFixed(2);
                document.getElementById('statClicks').innerText = data.clicks;
            } catch (error) {
                console.error('Ошибка загрузки баланса:', error);
            }
        }

        // Запуск
        authUser();

        // Главная кнопка Telegram
        tg.MainButton.setText('🏴 Войти').show();
    </script>
</body>
</html>
