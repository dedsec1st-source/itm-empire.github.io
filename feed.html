<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 LTM Feed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #8b0000;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            flex: 1;
        }
        
        .create-post {
            background: #8b0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .post-card {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            margin-right: 10px;
        }
        
        .post-author {
            font-weight: bold;
            color: #d4af37;
        }
        
        .post-time {
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .post-content {
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .post-likes {
            color: #888;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .like-btn {
            background: none;
            border: 1px solid #8b0000;
            color: #d4af37;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .like-btn:hover {
            background: #8b0000;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            border: 2px solid #8b0000;
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            margin: 10px 0;
            background: #3a3a3a;
            border: 1px solid #8b0000;
            border-radius: 8px;
            color: #fff;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .modal-btn.primary {
            background: #8b0000;
            color: #fff;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">📰 Лента</span>
        <button class="create-post" onclick="showCreatePost()">+ Пост</button>
    </div>

    <div id="feed"></div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    
    <div class="modal" id="postModal">
        <h3>Создать пост</h3>
        <textarea id="postContent" placeholder="Что у тебя нового?"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn primary" onclick="createPost()">Опубликовать</button>
            <button class="modal-btn" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://85.239.60.142:3000';

        let tg = window.Telegram.WebApp;
        tg.ready();

        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? user.id.toString() : 'guest_' + Date.now();

        async function loadFeed() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/feed`);
                const posts = await response.json();
                
                const feed = document.getElementById('feed');
                feed.innerHTML = '';
                
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    
                    let likedBy = post.liked_by || [];
                    let isLiked = likedBy.includes(currentUserId);
                    
                    card.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">${post.first_name ? post.first_name[0] : '👤'}</div>
                            <div class="post-author">${post.first_name || 'Аноним'}</div>
                            <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-likes">
                            <button class="like-btn" onclick="likePost(${post.id}, this)">❤️ ${post.likes}</button>
                        </div>
                    `;
                    
                    feed.appendChild(card);
                });
            } catch (error) {
                console.error('Ошибка загрузки ленты:', error);
            }
        }

        async function likePost(postId, btn) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                
                const data = await response.json();
                if (data.success) {
                    loadFeed();
                }
            } catch (error) {
                console.error('Ошибка лайка:', error);
            }
        }

        function showCreatePost() {
            document.getElementById('postModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('postModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId,
                        content: content
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    closeModal();
                    document.getElementById('postContent').value = '';
                    loadFeed();
                }
            } catch (error) {
                console.error('Ошибка создания поста:', error);
            }
        }

        loadFeed();
    </script>
</body>
</html>
