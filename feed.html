<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 LTM Feed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            width: 100%;
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #8b0000;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 20px;
            font-weight: bold;
            flex: 1;
        }
        
        .create-post-btn {
            background: #8b0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .create-post-btn:hover {
            background: #a00;
            transform: scale(1.05);
        }
        
        .feed-container {
            width: 100%;
            max-width: 600px;
        }
        
        .post-card {
            background: #1a1a1a;
            border: 1px solid #8b0000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139,0,0,0.3);
        }
        
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-size: 20px;
            margin-right: 15px;
            border: 2px solid #d4af37;
        }
        
        .post-author {
            flex: 1;
        }
        
        .post-author-name {
            color: #d4af37;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 3px;
        }
        
        .post-time {
            color: #888;
            font-size: 12px;
        }
        
        .post-content {
            margin-bottom: 15px;
            line-height: 1.5;
            color: #fff;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            color: #888;
            font-size: 14px;
        }
        
        .post-actions {
            display: flex;
            gap: 20px;
            border-top: 1px solid #2a2a2a;
            padding-top: 15px;
        }
        
        .post-action {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            justify-content: center;
        }
        
        .post-action:hover {
            color: #d4af37;
        }
        
        .post-action.liked {
            color: #8b0000;
        }
        
        .post-action .count {
            font-size: 14px;
        }
        
        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2a2a2a;
        }
        
        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        
        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-size: 14px;
        }
        
        .comment-content {
            flex: 1;
        }
        
        .comment-author {
            color: #d4af37;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 3px;
        }
        
        .comment-text {
            color: #fff;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .comment-time {
            color: #888;
            font-size: 10px;
            margin-top: 3px;
        }
        
        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .comment-input {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #8b0000;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
        }
        
        .comment-input:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .comment-btn {
            background: #8b0000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .comment-btn:hover {
            background: #a00;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            border-radius: 15px;
            padding: 25px;
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            color: #fff;
            border: 2px solid #8b0000;
        }
        
        .modal h3 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        
        .modal textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            background: #3a3a3a;
            border: 1px solid #8b0000;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
            resize: vertical;
        }
        
        .modal textarea:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .modal-btn.primary {
            background: #8b0000;
            color: #fff;
        }
        
        .modal-btn.primary:hover {
            background: #a00;
        }
        
        .modal-btn.secondary {
            background: #3a3a3a;
            color: #fff;
        }
        
        .modal-btn.secondary:hover {
            background: #4a4a4a;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
        
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .no-posts {
            text-align: center;
            color: #888;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #8b0000;
        }
        
        .no-posts .emoji {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    
    <div class="modal" id="createPostModal">
        <h3>✍️ Создать пост</h3>
        <textarea id="postContent" placeholder="О чём думаешь, Император?"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn primary" onclick="createPost()">Опубликовать</button>
            <button class="modal-btn secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">📰 LTM Feed</span>
        <button class="create-post-btn" onclick="showCreatePostModal()">+ Создать пост</button>
    </div>

    <div class="feed-container" id="feedContainer">
        <div class="loading">🦇 Загрузка ленты...</div>
    </div>

    <script>
        // Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Данные пользователя
        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? 'tg_' + user.id : 'guest_' + Date.now();
        let currentUserName = user ? user.first_name + (user.last_name ? ' ' + user.last_name : '') : 'Гость';
        let currentUserAvatar = user?.photo_url || null;
        
        // Загрузка постов из localStorage
        let posts = JSON.parse(localStorage.getItem('ltm_posts')) || [];
        
        // Сохраняем инфо о пользователе
        if (user) {
            localStorage.setItem('tg_id', user.id);
            localStorage.setItem('tg_username', user.username || user.first_name);
        }
        
        // Отображение ленты
        function renderFeed() {
            let container = document.getElementById('feedContainer');
            
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="no-posts">
                        <span class="emoji">🦇</span>
                        <div>В ленте пока пусто</div>
                        <div style="font-size: 13px; margin-top: 10px;">Будь первым, кто напишет пост!</div>
                    </div>
                `;
                return;
            }
            
            // Сортируем посты по времени (новые сверху)
            let sortedPosts = [...posts].sort((a, b) => b.timestamp - a.timestamp);
            
            let html = '';
            sortedPosts.forEach((post, index) => {
                let isLiked = post.likes?.includes(currentUserId);
                let likeCount = post.likes?.length || 0;
                let commentCount = post.comments?.length || 0;
                let repostCount = post.reposts || 0;
                
                html += `
                    <div class="post-card" id="post-${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">
                                ${post.authorAvatar ? `<img src="${post.authorAvatar}" style="width:100%; height:100%; border-radius:50%;">` : (post.authorName ? post.authorName.charAt(0).toUpperCase() : '👤')}
                            </div>
                            <div class="post-author">
                                <div class="post-author-name">${post.authorName}</div>
                                <div class="post-time">${formatTime(post.timestamp)}</div>
                            </div>
                        </div>
                        
                        <div class="post-content">
                            ${post.content.replace(/\n/g, '<br>')}
                        </div>
                        
                        <div class="post-stats">
                            <span>❤️ ${likeCount}</span>
                            <span>💬 ${commentCount}</span>
                            <span>🔄 ${repostCount}</span>
                        </div>
                        
                        <div class="post-actions">
                            <div class="post-action ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                <span>❤️</span>
                                <span class="count">${likeCount}</span>
                            </div>
                            <div class="post-action" onclick="toggleComments(${post.id})">
                                <span>💬</span>
                                <span class="count">${commentCount}</span>
                            </div>
                            <div class="post-action" onclick="repost(${post.id})">
                                <span>🔄</span>
                                <span class="count">${repostCount}</span>
                            </div>
                        </div>
                        
                        <div class="comments-section" id="comments-${post.id}" style="display: none;">
                            <div id="comments-list-${post.id}">
                                ${renderComments(post.comments)}
                            </div>
                            
                            <div class="add-comment">
                                <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Напиши комментарий...">
                                <button class="comment-btn" onclick="addComment(${post.id})">Отправить</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Форматирование времени
        function formatTime(timestamp) {
            let date = new Date(timestamp);
            let now = new Date();
            let diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'только что';
            if (diff < 3600) return Math.floor(diff / 60) + ' мин назад';
            if (diff < 86400) return Math.floor(diff / 3600) + ' ч назад';
            return date.toLocaleDateString();
        }
        
        // Отображение комментариев
        function renderComments(comments) {
            if (!comments || comments.length === 0) {
                return '<div style="color: #888; padding: 10px;">Нет комментариев</div>';
            }
            
            let html = '';
            comments.forEach(comment => {
                html += `
                    <div class="comment">
                        <div class="comment-avatar">${comment.authorName ? comment.authorName.charAt(0).toUpperCase() : '👤'}</div>
                        <div class="comment-content">
                            <div class="comment-author">${comment.authorName}</div>
                            <div class="comment-text">${comment.text}</div>
                            <div class="comment-time">${formatTime(comment.timestamp)}</div>
                        </div>
                    </div>
                `;
            });
            
            return html;
        }
        
        // Показать модалку создания поста
        function showCreatePostModal() {
            document.getElementById('createPostModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }
        
        // Закрыть модалку
        function closeModal() {
            document.getElementById('createPostModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('postContent').value = '';
        }
        
        // Создание поста
        function createPost() {
            let content = document.getElementById('postContent').value.trim();
            if (!content) {
                tg.showAlert('Напиши что-нибудь!');
                return;
            }
            
            let post = {
                id: Date.now(),
                authorId: currentUserId,
                authorName: currentUserName,
                authorAvatar: currentUserAvatar,
                content: content,
                timestamp: Date.now(),
                likes: [],
                comments: [],
                reposts: 0
            };
            
            posts.unshift(post);
            localStorage.setItem('ltm_posts', JSON.stringify(posts));
            
            closeModal();
            renderFeed();
            
            tg.HapticFeedback?.notificationOccurred('success');
        }
        
        // Лайк поста
        function toggleLike(postId) {
            let post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (!post.likes) post.likes = [];
            
            let index = post.likes.indexOf(currentUserId);
            if (index === -1) {
                post.likes.push(currentUserId);
            } else {
                post.likes.splice(index, 1);
            }
            
            localStorage.setItem('ltm_posts', JSON.stringify(posts));
            renderFeed();
        }
        
        // Показать/скрыть комментарии
        function toggleComments(postId) {
            let commentsSection = document.getElementById('comments-' + postId);
            if (commentsSection) {
                commentsSection.style.display = commentsSection.style.display === 'none' ? 'block' : 'none';
            }
        }
        
        // Добавление комментария
        function addComment(postId) {
            let input = document.getElementById('comment-input-' + postId);
            let text = input.value.trim();
            if (!text) return;
            
            let post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (!post.comments) post.comments = [];
            
            post.comments.push({
                authorId: currentUserId,
                authorName: currentUserName,
                text: text,
                timestamp: Date.now()
            });
            
            localStorage.setItem('ltm_posts', JSON.stringify(posts));
            
            input.value = '';
            renderFeed();
            
            // Автоматически показываем комментарии
            document.getElementById('comments-' + postId).style.display = 'block';
        }
        
        // Репост
        function repost(postId) {
            let post = posts.find(p => p.id === postId);
            if (!post) return;
            
            post.reposts = (post.reposts || 0) + 1;
            localStorage.setItem('ltm_posts', JSON.stringify(posts));
            renderFeed();
            
            tg.HapticFeedback?.impactOccurred('light');
        }
        
        // Инициализация
        renderFeed();
        
        // Главная кнопка Telegram
        tg.MainButton.setText('⚔️ LTM Empire').show();
        tg.MainButton.onClick(() => {
            window.location.href = 'index.html';
        });
        
        // Закрытие модалки по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
