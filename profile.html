<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 LTM Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #8b0000;
            margin-bottom: 30px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            flex: 1;
        }
        
        .profile-card {
            background: #1a1a1a;
            border: 2px solid #8b0000;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #8b0000;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #d4af37;
            border: 3px solid #d4af37;
            overflow: hidden;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-name {
            font-size: 24px;
            color: #d4af37;
            margin-bottom: 5px;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-item {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-value {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
        }
        
        .transfer-btn {
            background: #8b0000;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">👤 Профиль</span>
    </div>

    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">💀</div>
        <div class="profile-name" id="profileName">Загрузка...</div>
        
        <div class="profile-stats">
            <div class="stat-item">
                <div class="stat-value" id="statBalance">0</div>
                <div class="stat-label">LTM</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statClicks">0</div>
                <div class="stat-label">кликов</div>
            </div>
        </div>
        
        <button class="transfer-btn" onclick="alert('Переводы будут позже')">💰 Перевести LTM</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();

        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? user.id.toString() : 'guest_' + Date.now();

        async function loadProfile() {
            if (user) {
                document.getElementById('profileName').innerText = user.first_name;
                if (user.photo_url) {
                    document.getElementById('profileAvatar').innerHTML = `<img src="${user.photo_url}">`;
                }
            }

            try {
                const url = API_BASE_URL ? `${API_BASE_URL}/api/balance/${currentUserId}` : `/api/balance/${currentUserId}`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('statBalance').innerText = data.balance.toFixed(2);
                document.getElementById('statClicks').innerText = data.clicks;
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
            }
        }

        loadProfile();
    </script>
</body>
</html>
