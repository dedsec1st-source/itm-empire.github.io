<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 LTM Messenger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Шапка */
        .header {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #8b0000;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            text-decoration: none;
        }
        
        .header-title {
            color: #d4af37;
            font-size: 20px;
            font-weight: bold;
            flex: 1;
        }
        
        .header-status {
            color: #888;
            font-size: 14px;
        }
        
        /* Основной контент */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Список чатов (слева) */
        .chats-sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chats-header {
            padding: 15px;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .chats-header h3 {
            color: #d4af37;
            margin-bottom: 10px;
        }
        
        .new-chat-btn {
            background: #8b0000;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
        }
        
        .new-chat-btn:hover {
            background: #a00;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        
        .chat-item:hover {
            background: #2a2a2a;
        }
        
        .chat-item.active {
            background: #2a2a2a;
            border-left: 3px solid #8b0000;
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-size: 20px;
            margin-right: 12px;
            position: relative;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #1a1a1a;
            display: none;
        }
        
        .online-dot.online {
            display: block;
        }
        
        .chat-info {
            flex: 1;
            overflow: hidden;
        }
        
        .chat-name {
            color: #fff;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .chat-last {
            color: #888;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            color: #888;
            font-size: 11px;
            margin-left: 8px;
        }
        
        /* Область сообщений (справа) */
        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            overflow: hidden;
        }
        
        .messages-header {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .current-chat-name {
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
        }
        
        .current-chat-status {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message-wrapper {
            display: flex;
            flex-direction: column;
        }
        
        .message-wrapper.own {
            align-items: flex-end;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-break: break-word;
        }
        
        .message.own {
            background: #8b0000;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        
        .message.other {
            background: #2a2a2a;
            color: #fff;
            border-bottom-left-radius: 4px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 11px;
            color: #aaa;
        }
        
        .message-time {
            font-size: 10px;
            margin-left: 10px;
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        
        /* Поле ввода */
        .input-area {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2a2a2a;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 15px;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 15px;
        }
        
        .message-input:focus {
            outline: 1px solid #8b0000;
        }
        
        .message-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #8b0000;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:disabled {
            background: #4a4a4a;
            cursor: not-allowed;
        }
        
        .send-btn:hover:not(:disabled) {
            background: #a00;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            border-radius: 15px;
            padding: 25px;
            z-index: 1000;
            width: 300px;
            color: #fff;
            border: 1px solid #8b0000;
        }
        
        .modal h3 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        
        .modal input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #3a3a3a;
            border: none;
            border-radius: 8px;
            color: #fff;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .modal-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .modal-btn.primary {
            background: #8b0000;
            color: #fff;
        }
        
        .modal-btn.secondary {
            background: #3a3a3a;
            color: #fff;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
        
        .status {
            color: #888;
            font-size: 12px;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal" id="chatModal">
        <h3>🦇 Новый чат</h3>
        <input type="text" id="newChatId" placeholder="ID собеседника">
        <div class="modal-buttons">
            <button class="modal-btn primary" onclick="createChat()">Создать</button>
            <button class="modal-btn secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <!-- Шапка -->
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <span class="header-title">💬 LTM Messenger</span>
        <span class="header-status" id="userStatus"></span>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Список чатов слева -->
        <div class="chats-sidebar">
            <div class="chats-header">
                <h3>Чаты</h3>
                <button class="new-chat-btn" onclick="showModal()">+ Новый чат</button>
            </div>
            <div class="chats-list" id="chatsList">
                <div style="color: #777; text-align: center; padding: 20px;">Загрузка...</div>
            </div>
        </div>

        <!-- Область сообщений справа -->
        <div class="messages-area">
            <div class="messages-header">
                <div class="current-chat-name" id="currentChatName">Выберите чат</div>
                <div class="current-chat-status" id="currentChatStatus"></div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div style="color: #777; text-align: center; padding: 20px;">💀 Выберите чат для общения</div>
            </div>
            
            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." disabled>
                <button class="send-btn" id="sendButton" onclick="sendMessage()" disabled>➤</button>
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        // Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Получаем данные пользователя
        let user = tg.initDataUnsafe?.user;
        let currentUserId = user ? 'tg_' + user.id : 'guest_' + Date.now();
        let currentContact = null;
        let messages = [];
        let chats = [
            { id: 'saved', name: '💀 Сохранённые', last: 'Нет сообщений', time: '' }
        ];
        
        // Сохраняем инфо о пользователе
        if (user) {
            document.getElementById('userStatus').innerHTML = `👤 ${user.first_name}`;
            localStorage.setItem('tg_id', user.id);
            localStorage.setItem('tg_username', user.username || user.first_name);
        }
        
        // Загрузка чатов
        function loadChats() {
            const list = document.getElementById('chatsList');
            list.innerHTML = '';
            
            chats.forEach(chat => {
                const chatElement = document.createElement('div');
                chatElement.className = 'chat-item';
                if (currentContact === chat.id) chatElement.classList.add('active');
                chatElement.onclick = () => selectChat(chat);
                chatElement.innerHTML = `
                    <div class="chat-avatar">
                        ${chat.id === 'saved' ? '💀' : '👤'}
                        <span class="online-dot ${chat.online ? 'online' : ''}"></span>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${chat.name}</div>
                        <div class="chat-last">${chat.last}</div>
                    </div>
                    <div class="chat-time">${chat.time}</div>
                `;
                list.appendChild(chatElement);
            });
        }
        
        // Выбор чата
        function selectChat(chat) {
            currentContact = chat.id === 'saved' ? null : chat.id;
            
            document.getElementById('currentChatName').innerText = chat.name;
            document.getElementById('currentChatStatus').innerText = chat.id === 'saved' ? 'личные заметки' : 'онлайн';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendButton').disabled = false;
            
            loadMessages();
        }
        
        // Загрузка сообщений (из localStorage для демо)
        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            // Заглушка
            container.innerHTML = '<div style="color: #777; text-align: center; padding: 20px;">🦇 Здесь пока пусто</div>';
        }
        
        // Отправка сообщения
        function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            if (!text) return;
            
            setStatus('⏳ Отправка...');
            
            // Для демо просто показываем в консоли
            console.log('Сообщение:', text);
            
            document.getElementById('messageInput').value = '';
            setStatus('✅ Отправлено (демо-режим)');
        }
        
        // Создание чата
        function createChat() {
            const contactId = document.getElementById('newChatId').value.trim();
            if (!contactId) return;
            
            chats.push({
                id: contactId,
                name: '👤 Чат с ' + contactId.substring(0,6),
                last: 'Новый чат',
                time: '',
                online: false
            });
            
            loadChats();
            closeModal();
            document.getElementById('newChatId').value = '';
        }
        
        // Модальное окно
        function showModal() {
            document.getElementById('chatModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('chatModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        function setStatus(text) {
            document.getElementById('status').innerText = text;
        }
        
        // Инициализация
        loadChats();
        
        // Главная кнопка Telegram
        tg.MainButton.setText('⚔️ LTM Empire').show();
        tg.MainButton.onClick(() => {
            tg.close();
        });
        
        // Закрытие по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
